name: Export cost optimisation hub data

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  export-cost-optimisation-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pipenv"
      - name: Install Pipenv
        run: |
          pip install pipenv
          pipenv install
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e977f476bf97137dd509f98c23d8d100c08a6862 # v4.0.2
        with:
          role-to-assume: ${{secrets.AWS_COAT_GITHUB_ACTIONS_READONLY_ARN}}
          aws-region: eu-west-2
      - name: Run Python script
        run: pipenv run python3 -m bin.export_opt_hub_data
      - name: Upload CSV artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cost-optimization-recommendations
          path: cost_optimization_recommendations.csv
